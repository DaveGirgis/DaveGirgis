<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dry Fire Par Timer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Dry Fire Par Timer</h1>
      <p class="subtitle">
        Configure your start delay, par time, and repetitions. This app emits a
        0.30s tone at start and a 0.25s tone at par.
      </p>

      <section class="controls">
        <label>
          Par time (seconds)
          <input id="parTime" type="number" min="0.1" step="0.05" value="2.0" />
        </label>

        <label>
          Random start min (seconds)
          <input id="randomMin" type="number" min="0" step="0.1" value="3.0" />
        </label>

        <label>
          Random start max (seconds)
          <input id="randomMax" type="number" min="0" step="0.1" value="5.0" />
        </label>

        <label>
          Repetitions
          <input id="repetitions" type="number" min="1" step="1" value="1" />
        </label>

        <label>
          Rest between reps (seconds)
          <input id="restTime" type="number" min="0" step="0.1" value="1.0" />
        </label>
      </section>

      <section class="buttons">
        <button id="startBtn">Start</button>
        <button id="stopBtn" class="secondary" disabled>Stop</button>
      </section>

      <section class="status" aria-live="polite">
        <p id="statusText">Ready.</p>
        <p id="repText"></p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
